###########################################################
### Beautiful Jekyll config — AgenticJennifer.github.io
###########################################################

############################
# --- Required options --- #
############################

title: From the Lab
author: Jennifer Lee Scott

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  About: "aboutme"
  Blog: "blog"

################
# --- Logo --- #
################

avatar: "/assets/img/avatar-icon.png"
round-avatar: false

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  email: "jenniferfader@gmail.com"
  rss: true
  github: AgenticJennifer
  linkedin: jenniferfader

################
# --- SEO --- #
################

description: "AI Engineer · Prompt Engineer · Context Engineer | Fine-tuning LLMs, building agents, shipping in public from Santa Monica."
url: "https://AgenticJennifer.github.io"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"
timezone: "America/Los_Angeles"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap

